name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Debug environment
        run: |
          node -v
          npm -v
          npm config get registry
          npm config list

      - name: Inspect package-lock
        run: |
          grep -n "@emnapi" package-lock.json || true

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate data
        run: npm run validate:data

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker build
        run: docker build -t sgb-api:ci .
